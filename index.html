			}

			.titlebar {

				padding: 6px 12px;
				display: flex;
				align-items: center;
				position: relative;
				margin-bottom: 10px;
			}

			.titlebar-icon {
				position: absolute;
				left: 6px;
			}

				font-weight: 500;
				font-size: 24px !important;
				color: #ffffff;
				width: 100%;
				text-align: center;
			}

			.highlightHide{
				color: #23252E;
			}

			#output div {
				color: #ffffff;
				word-break: break-all;
			}

			.input-line {
				display: flex;
			}

			.prompt, .prompt-js {
				font-weight: 700;
				color: #277fff;
                user-select: none;
			}

			#input-wrapper {
			    position: relative;
			    flex: 1;
			    margin-left: 10px;
			}

			#ghost {
			    position: absolute;
			    color: #7f7f7f;
			    pointer-events: none;
			    white-space: pre;
			    top: 0;
				left: 0;
			}

			#commandInput {
				background: none;
				border: none;
				outline: none;
				color: #ffffff;
				caret-shape: block;
				caret-color: #ffffff;
				width: 100%;
				/*margin-left: 10px;*/
				user-select: text;
				font-weight: 300;
				padding: 0;
				margin: 0;
				z-index: 1;
				position: relative;
			}

			::selection, #commandInput::selection {
				background-color: #E6E6E6;
				color: #23252E;
			}

			.highlightHide::selection{
				background-color: #23252E;
				color: #E6E6E6;
			}
