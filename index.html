				color: #ffffff;
				caret-shape: block;

				font-weight: 300;
				padding: 0;
				margin: 0;
				z-index: 1;
				position: relative;
			}

			::selection, #commandInput::selection {
				background-color: #E6E6E6;
				color: #23252E;
			}

			.highlightHide::selection{
				background-color: #23252E;
